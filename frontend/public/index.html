    <!-- Fix for Instagram In-App Browser and Other Browsers -->
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="mobile-web-app-capable" content="yes" />
    
    <!-- Prevent In-App Browsers from caching -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    
    <title>voro - متجر voro الإلكتروني</title>
    <style>
      /* Ensure root element takes full height */
      html, body, #root {
        width: 100%;
        min-height: 100%; /* Changed from 100vh to avoid scroll traps */
        margin: 0;
        padding: 0;
        overflow-x: hidden;
        overflow-y: auto !important; /* Force scrolling */
        -webkit-overflow-scrolling: touch !important;
        touch-action: pan-y !important;
      }
      body {
        font-family: 'Cairo', 'Tajawal', sans-serif;
        background-color: #f9fafb;
      }
    </style>
  </head>
  <body>
    <noscript>يجب تفعيل JavaScript لتشغيل هذا التطبيق.</noscript>
    <div id="root"></div>
    <script>
      // Force reload on resource failure
      window.addEventListener('error', function(e) {
        if (e.target.tagName === 'SCRIPT' || e.target.tagName === 'LINK') {
          console.warn('Resource failed to load, reloading page...');
          // Check if we already reloaded recently to avoid infinite loop
          const lastReload = sessionStorage.getItem('last_resource_reload');
          const now = Date.now();
          if (!lastReload || (now - lastReload > 30000)) {
            sessionStorage.setItem('last_resource_reload', now);
            window.location.reload(true);
          }
        }
      }, true);

      // Detect In-App Browser and fix viewport height
      (function() {
        const isInstagram = /Instagram/.test(navigator.userAgent);
        const isFB = /FBAN|FBAV/.test(navigator.userAgent);
        
        if (isInstagram || isFB) {
          console.log('In-App Browser Detected');
          
          // Clear caches to prevent WSOD
          if ('caches' in window) {
            caches.keys().then(function(names) {
              for (let name of names) caches.delete(name);
            });
          }
        }
      })();
    </script>
  </body>
